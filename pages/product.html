<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Details | Gilded Bean</title>
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/theme.css" />
    <link rel="stylesheet" href="../css/premium-style.css" />
    <style>
      body {
        background: #0a0a0b;
        color: #fff;
      }
      .product-detail-wrapper {
        max-width: 1100px;
        margin: 120px auto 60px;
        margin-left: 260px;
        padding: 0 24px;
      }
      .product-detail {
        display: grid;
        grid-template-columns: 1.1fr 1fr;
        gap: 30px;
      }
      .product-image-large {
        width: 100%;
        height: 520px;
        object-fit: cover;
        border-radius: 16px;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6);
      }
      .product-info {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .product-title {
        font-size: 2.7rem;
        font-family: var(--font-serif);
        color: #efefef;
      }
      .product-price {
        font-size: 2rem;
        color: #d4af37;
        font-weight: 800;
      }
      .product-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .tag {
        border: 1px solid #777;
        border-radius: 12px;
        color: #ccc;
        font-size: 0.85rem;
        padding: 6px 10px;
      }
      .btn-primary {
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #d4af37, #c67c4e);
        color: #000;
        padding: 12px 18px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        width: fit-content;
        transition: all 0.2s ease;
      }
      .btn-primary:hover {
        transform: scale(1.03);
      }
      .section {
        margin-top: 30px;
        background: #121214;
        border-radius: 14px;
        border: 1px solid #1f1f22;
        padding: 18px;
      }
      .section h3 {
        margin-bottom: 12px;
      }
      .loading {
        text-align: center;
        color: #aaa;
        margin-top: 140px;
      }
      .not-found {
        color: #f55;
        text-align: center;
        margin-top: 140px;
      }
      @media (max-width: 980px) {
        .product-detail {
          grid-template-columns: 1fr;
        }
        .product-detail-wrapper {
          margin-left: 0;
          padding-top: 100px;
        }
      }
    </style>
  </head>
  <body>
    <div id="navbar-root"></div>
    <div id="cart-root"></div>

    <main class="product-detail-wrapper">
      <div id="product-root">
        <div class="loading">Loading product...</div>
      </div>
    </main>

    <script type="module" src="../js/product.js"></script>
  </body>
</html>
