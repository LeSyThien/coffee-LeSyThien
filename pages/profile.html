<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile | Gilded Bean</title>
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/theme.css" />
    <link rel="stylesheet" href="../css/premium-style.css" />
    <link rel="stylesheet" href="../css/pages/profile-premium.css" />
    <style>
      .logout-modal {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        z-index: 2500;
        opacity: 0;
        pointer-events: none;
        transition: opacity var(--transition-base) var(--easing-smooth);
      }

      .logout-modal.open {
        opacity: 1;
        pointer-events: auto;
      }

      .logout-modal .modal-overlay {
        position: absolute;
        inset: 0;
        background: rgba(10, 10, 11, 0.78);
        backdrop-filter: blur(10px);
      }

      .logout-modal .modal-content {
        position: relative;
        width: min(100%, 420px);
        background: linear-gradient(
          135deg,
          rgba(18, 18, 20, 0.92),
          rgba(28, 28, 30, 0.88)
        );
        border: 1px solid rgba(212, 175, 55, 0.24);
        border-radius: 24px;
        padding: 28px;
        text-align: center;
        box-shadow: var(--shadow-xl), var(--glow-gold);
        backdrop-filter: blur(24px);
        transform: translateY(24px) scale(0.96);
        transition: transform var(--transition-base) var(--easing-smooth);
      }

      .logout-modal.open .modal-content {
        transform: translateY(0) scale(1);
      }

      .logout-modal h3 {
        margin: 0 0 12px;
        color: var(--color-metallic-gold);
        font-size: 1.5rem;
      }

      .logout-modal p {
        margin: 0;
        color: var(--color-text-secondary);
      }

      .countdown-display {
        width: 72px;
        height: 72px;
        margin: 24px auto;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        border: 1px solid rgba(212, 175, 55, 0.28);
        background: radial-gradient(
          circle,
          rgba(212, 175, 55, 0.18) 0%,
          rgba(255, 255, 255, 0.04) 70%
        );
        color: var(--color-metallic-gold);
        font-size: 1.9rem;
        font-weight: 700;
        box-shadow: inset 0 0 24px rgba(212, 175, 55, 0.08);
      }

      .modal-actions {
        display: flex;
        gap: 12px;
      }

      .btn-confirm-logout,
      .btn-cancel-logout {
        flex: 1;
        border: 1px solid transparent;
        border-radius: 12px;
        padding: 12px 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all var(--transition-fast) var(--easing-primary);
      }

      .btn-confirm-logout {
        background: linear-gradient(135deg, var(--color-error), #d9363e);
        color: var(--color-text-primary);
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-confirm-logout.active {
        opacity: 1;
        cursor: pointer;
        box-shadow: 0 10px 24px rgba(255, 77, 79, 0.28);
      }

      .btn-cancel-logout {
        background: rgba(255, 255, 255, 0.05);
        color: var(--color-text-primary);
        border-color: rgba(212, 175, 55, 0.18);
      }

      .btn-cancel-logout:hover,
      .btn-confirm-logout.active:hover {
        transform: translateY(-1px);
      }
    </style>
  </head>
  <body>
    <div id="navbar-root"></div>

    <!-- Floating Particles Background -->
    <div class="floating-particles" id="floating-particles"></div>

    <!-- Main Profile Dashboard -->
    <main class="profile-main">
      <div class="profile-dashboard">
        <!-- LEFT: Holographic Member Card -->
        <div class="member-card-section">
          <div class="holographic-card" id="member-card">
            <div class="card-header">
              <div class="crown-icon">👑</div>
              <div class="card-title">VIP MEMBER</div>
            </div>
            <div class="avatar-section">
              <div class="avatar-container">
                <div class="avatar" id="user-avatar">👤</div>
                <div class="avatar-glow"></div>
              </div>
            </div>
            <div class="user-info">
              <div class="user-name" id="user-name">Loading...</div>
              <div class="user-email" id="user-email">Loading...</div>
            </div>
            <div class="vip-level-display">
              <div class="level-badge" id="vip-level-badge">VIP 0</div>
            </div>
          </div>
        </div>

        <!-- RIGHT: Settings & Form Section -->
        <div class="settings-section">
          <div class="glass-container">
            <h3 class="settings-title">Account Settings</h3>

            <!-- Personal Information Form -->
            <div class="profile-section">
              <div class="section-header">
                <div class="section-title">👤 Personal Information</div>
              </div>

              <form id="profile-form" class="profile-form">
                <div class="form-group">
                  <label class="form-label" for="email-input"
                    >Email Address</label
                  >
                  <input
                    type="email"
                    id="email-input"
                    class="form-input"
                    readonly
                    placeholder="Your email"
                  />
                </div>

                <div class="form-group">
                  <label class="form-label" for="name-input">Full Name</label>
                  <input
                    type="text"
                    id="name-input"
                    class="form-input"
                    placeholder="Enter your full name"
                  />
                </div>

                <div class="form-group">
                  <label class="form-label" for="phone-input"
                    >Phone Number</label
                  >
                  <input
                    type="tel"
                    id="phone-input"
                    class="form-input"
                    placeholder="Enter your phone number"
                  />
                </div>

                <div class="form-group">
                  <label class="form-label" for="address-input"
                    >Delivery Address</label
                  >
                  <input
                    type="text"
                    id="address-input"
                    class="form-input"
                    placeholder="Enter your delivery address"
                  />
                </div>

                <div class="form-group">
                  <label class="form-label" for="avatar-input"
                    >Profile Picture</label
                  >
                  <div class="file-input-container">
                    <input
                      type="file"
                      id="avatar-input"
                      class="file-input"
                      accept="image/*"
                    />
                    <label for="avatar-input" class="file-input-label">
                      <span>📷</span> Choose Profile Picture
                    </label>
                  </div>
                  <div class="info-text">
                    Upload a new profile picture (max 5MB)
                  </div>
                </div>

                <div class="action-buttons">
                  <button type="button" id="save-changes-btn" class="btn-save">
                    <span>💾</span> Save Changes
                  </button>
                </div>
              </form>

              <!-- Logout Section -->
              <div class="logout-section">
                <button id="logout-btn" class="logout-btn">
                  <span>🚪</span> Sign Out
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Logout Confirmation Modal -->
    <div class="logout-modal" id="logout-modal">
      <div class="modal-overlay" id="logout-overlay"></div>
      <div class="modal-content">
        <h3>Confirm Sign Out?</h3>
        <p>You will be signed out of the application.</p>
        <div class="countdown-display" id="countdown">3</div>
        <div class="modal-actions">
          <button class="btn-confirm-logout" id="confirm-logout">
            Sign Out
          </button>
          <button class="btn-cancel-logout" id="cancel-logout">Cancel</button>
        </div>
      </div>
    </div>

    <div id="toast"></div>

    <!-- Main Script -->
    <script type="module">
      // ===== IMPORTS =====
      import { initializeAuth } from "../js/core/auth-init.js";
      import { initRender } from "../js/core/render.js";
      import { renderMemberRankBadge } from "../js/pages/profile.js";
      import { initNavbar } from "../js/components/navbar.js";
      import { initCart } from "../js/components/cart.js";
      import {
        toastError,
        toastSuccess,
      } from "../js/services/toast.service.js";
      import {
        auth,
        saveUserProfile,
        logoutUser,
        uploadAvatar,
      } from "../js/services/firebase.service.js";
      import store from "../js/store/index.js";

      // ===== DOM ELEMENTS (Declared Once) =====
      // Form Input Elements
      const emailInput = document.getElementById("email-input");
      const nameInput = document.getElementById("name-input");
      const phoneInput = document.getElementById("phone-input");
      const addressInput = document.getElementById("address-input");
      const avatarInput = document.getElementById("avatar-input");
      const saveChangesBtn = document.getElementById("save-changes-btn");

      // Card Display Elements
      const userNameEl = document.getElementById("user-name");
      const userEmailEl = document.getElementById("user-email");
      const userAvatarEl = document.getElementById("user-avatar");
      const vipLevelBadge = document.getElementById("vip-level-badge");

      // Modal & Logout Elements
      const logoutBtn = document.getElementById("logout-btn");
      const logoutModal = document.getElementById("logout-modal");
      const logoutOverlay = document.getElementById("logout-overlay");
      const countdownEl = document.getElementById("countdown");
      const confirmLogoutBtn = document.getElementById("confirm-logout");
      const cancelLogoutBtn = document.getElementById("cancel-logout");

      // ===== STATE VARIABLES =====
      let currentUser = null;
      let currentAvatarUrl = "";
      let isUploading = false;
      let countdownInterval = null;

      // ===== INITIALIZATION =====
      initRender();
      initializeAuth()
        .then(() => {
          console.log("✅ Auth initialized successfully!");
          loadProfileData();
          renderMemberRankBadge();
        })
        .catch((error) => {
          console.error("❌ Auth initialization failed:", error);
          toastError("Failed to load profile");
        });

      initNavbar();
      initCart();

      // ===== CORE FUNCTIONS =====

      /**
       * Load profile data from Firestore
       */
      function loadProfileData() {
        if (!auth.currentUser) {
          window.location.href = "login.html";
          return;
        }

        currentUser = auth.currentUser;
        const userData = store.getState().user.data || {};

        // Populate form inputs
        emailInput.value = currentUser.email || "";
        nameInput.value = userData.name || "";
        phoneInput.value = userData.phone || "";
        addressInput.value = userData.address || "";
        currentAvatarUrl = userData.avatar || "";

        // Update card display
        updateCardDisplay(userData);
      }

      /**
       * Update both card and form display with current user data
       */
      function updateCardDisplay(userData) {
        // Update card left side
        if (userNameEl) {
          userNameEl.textContent = userData.name || "User";
        }
        if (userEmailEl) {
          userEmailEl.textContent = currentUser?.email || "";
        }

        // Update avatar display
        if (currentAvatarUrl) {
          userAvatarEl.innerHTML = `<img src="${currentAvatarUrl}" alt="Avatar" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;" />`;
        } else {
          const firstLetter = (userData.name || "U").charAt(0).toUpperCase();
          userAvatarEl.innerHTML = firstLetter;
        }

        // Update form inputs with latest data
        nameInput.value = userData.name || "";
        phoneInput.value = userData.phone || "";
        addressInput.value = userData.address || "";
      }

      /**
       * Avatar file selection handler
       */
      avatarInput.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;

        if (file.size > 5 * 1024 * 1024) {
          toastError("File size must be less than 5MB");
          avatarInput.value = "";
          return;
        }

        console.log("📷 Avatar selected:", file.name);
      });

      /**
       * Save Changes button handler - SECURITY: Only name, phone, address, avatar
       */
      saveChangesBtn.addEventListener("click", async () => {
        if (!currentUser || isUploading) return;

        isUploading = true;
        saveChangesBtn.disabled = true;

        const updates = {
          name: nameInput.value.trim(),
          phone: phoneInput.value.trim(),
          address: addressInput.value.trim(),
        };

        // Validate at least one field has changed
        const userData = store.getState().user.data || {};
        const hasChanges =
          updates.name !== userData.name ||
          updates.phone !== userData.phone ||
          updates.address !== userData.address ||
          avatarInput.files.length > 0;

        if (!hasChanges) {
          toastError("No changes to save");
          isUploading = false;
          saveChangesBtn.disabled = false;
          return;
        }

        try {
          // Handle avatar upload if selected
          if (avatarInput.files.length > 0) {
            const file = avatarInput.files[0];
            console.log("⬆️ Uploading avatar...");
            const avatarUrl = await uploadAvatar(file, currentUser.uid);
            updates.avatar = avatarUrl;
            currentAvatarUrl = avatarUrl;
            console.log("✅ Avatar uploaded:", avatarUrl);
          }

          // Save profile to Firestore (SECURITY: Only these fields)
          console.log("💾 Saving profile:", updates);
          await saveUserProfile(currentUser.uid, updates);
          console.log("✅ Profile saved successfully!");

          // Update store
          store.dispatch({
            type: "USER/SET_USER",
            payload: {
              ...userData,
              ...updates,
            },
          });

          // Update UI immediately
          updateCardDisplay({ ...userData, ...updates });

          // Clear file input
          avatarInput.value = "";

          toastSuccess("Profile updated successfully!");
        } catch (error) {
          console.error("❌ Save failed:", error);
          toastError("Failed to save changes: " + error.message);
        } finally {
          isUploading = false;
          saveChangesBtn.disabled = false;
        }
      });

      /**
       * Logout button handler
       */
      logoutBtn.addEventListener("click", () => {
        console.log("🚪 Logout initiated");
        logoutModal.classList.add("open");
        let countdown = 3;
        countdownEl.textContent = countdown;
        confirmLogoutBtn.classList.remove("active");
        confirmLogoutBtn.disabled = true;

        // Clear any existing countdown interval
        if (countdownInterval) clearInterval(countdownInterval);

        countdownInterval = setInterval(() => {
          countdown--;
          countdownEl.textContent = countdown;
          if (countdown <= 0) {
            clearInterval(countdownInterval);
            confirmLogoutBtn.classList.add("active");
            confirmLogoutBtn.disabled = false;
            console.log("🔓 Logout button activated");
          }
        }, 1000);
      });

      /**
       * Confirm logout handler
       */
      confirmLogoutBtn.addEventListener("click", async () => {
        try {
          console.log("🔓 Logging out...");
          if (countdownInterval) clearInterval(countdownInterval);
          await logoutUser();
          console.log("✅ Logged out successfully!");
          window.location.href = "login.html";
        } catch (error) {
          console.error("❌ Logout failed:", error);
          toastError("Failed to sign out");
        }
      });

      /**
       * Cancel logout handler
       */
      cancelLogoutBtn.addEventListener("click", () => {
        logoutModal.classList.remove("open");
        confirmLogoutBtn.classList.remove("active");
        confirmLogoutBtn.disabled = true;
        if (countdownInterval) clearInterval(countdownInterval);
        console.log("❌ Logout cancelled");
      });

      logoutOverlay.addEventListener("click", () => {
        logoutModal.classList.remove("open");
        confirmLogoutBtn.classList.remove("active");
        confirmLogoutBtn.disabled = true;
        if (countdownInterval) clearInterval(countdownInterval);
      });

      /**
       * Store subscription for real-time updates
       */
      store.subscribe(() => {
        const updatedState = store.getState();
        if (updatedState.user.data) {
          console.log("🔄 Store updated, refreshing profile...");
          loadProfileData();
          renderMemberRankBadge();
        }
      });

      console.log("✅ Profile page script loaded successfully!");
    </script>
  </body>
</html>
