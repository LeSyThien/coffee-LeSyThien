<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🏛️ VIP Club - Coffee Premium</title>
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/theme.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/premium-style.css" />
    <link rel="stylesheet" href="../css/vip-exclusive.css" />
    <link rel="stylesheet" href="../css/components.css" />
  </head>
  <body
    style="
      background: linear-gradient(
        135deg,
        #0a0a0b 0%,
        #1a1a1c 50%,
        #0a0a0b 100%
      );
      min-height: 100vh;
    "
  >
    <!-- Navbar -->
    <div id="navbar-root"></div>

    <!-- VIP Page Content -->
    <div id="vip-page-root">
      <div
        style="
          display: flex;
          align-items: center;
          justify-content: center;
          height: 80vh;
          flex-direction: column;
        "
      >
        <div class="luxury-spinner"></div>
        <div style="color: #d4af37; font-size: 1.1rem">
          Loading VIP Premium Experience...
        </div>
      </div>
    </div>

    <style>
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>

    <!-- Cart Sidebar -->
    <div id="cart-root"></div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <script type="module">
      import { initializeAuth } from "../js/core/auth-init.js";
      import {
        auth,
        db,
        claimDailyVIPGift,
        getUserVIPInfo,
        calculateMemberRank,
      } from "../js/services/firebase.service.js";
      import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
      import {
        doc,
        getDoc,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
      import { renderNavbar } from "../js/components/navbar.js";
      import { renderCart } from "../js/components/cart.js";
      import store from "../js/store/index.js";
      import {
        toastSuccess,
        toastError,
        toastInfo,
        initializeToastContainer,
      } from "../js/services/toast.service.js";

      // Initialize shared auth state
      initializeAuth()
        .then(() => {
          console.log("Auth initialized successfully!");
        })
        .catch((error) => {
          console.error("Auth initialization failed:", error);
        });

      // ⚡ SPEED: Hide loading spinner immediately if user was previously logged in
      const wasLoggedIn = sessionStorage.getItem("isLoggedIn") === "true";
      if (wasLoggedIn) {
        const loadingSpinner = document.querySelector(".spinner");
        if (loadingSpinner) {
          loadingSpinner.style.display = "none";
        }
      }

      // Check auth and load VIP page
      let isAuthChecked = false;

      onAuthStateChanged(auth, async (firebaseUser) => {
        // Hide loading spinner once auth check is complete (for first-time users)
        const loadingSpinner = document.querySelector(".spinner");
        if (loadingSpinner) {
          loadingSpinner.style.display = "none";
        }

        isAuthChecked = true;

        if (!firebaseUser) {
          // Show login overlay instead of redirecting
          const vipRoot = document.getElementById("vip-page-root");
          vipRoot.innerHTML = `
            <div class="vip-container">
              <div class="vip-header">
                <div class="vip-title">🔒 VIP Access Required</div>
                <div class="vip-subtitle">Please login to access exclusive VIP benefits</div>
              </div>
              <div style="text-align: center; padding: 2rem;">
                <button onclick="window.location.href='login.html'" class="vip-gift-button" style="padding: 1rem 2rem; font-size: 1.1rem;">
                  🚀 Login Now
                </button>
              </div>
            </div>
          `;
          return;
        }

        try {
          // Get user data
          const userRef = doc(db, "users", firebaseUser.uid);
          const userSnap = await getDoc(userRef);

          if (!userSnap.exists()) {
            toastError("User data not found");
            return;
          }

          const userData = userSnap.data();
          const vipInfo = calculateMemberRank(userData.totalSpent || 0);
          const vipFull = await getUserVIPInfo(firebaseUser.uid);

          // Update store
          store.dispatch({
            type: "SET_USER",
            payload: {
              data: {
                ...userData,
                uid: firebaseUser.uid,
                vipLevel: vipInfo.rank,
              },
            },
          });

          renderNavbar(store.getState());
          renderCart(store.getState());
          renderVipPage(userData, vipInfo, vipFull);

          // Real-time updates for progress bar
          store.subscribe(() => {
            renderNavbar(store.getState());
            renderCart(store.getState());
            updateVipProgress();
          });
        } catch (error) {
          console.error("Error loading VIP page:", error);
          toastError("Error loading VIP benefits");
        }
      });

      // Function to update progress bar in real-time
      function updateVipProgress() {
        const user = store.getState().user?.data;
        if (!user) return;

        const totalSpent = user.totalSpent || 0;
        const vipInfo = calculateMemberRank(totalSpent);

        if (vipInfo.rank >= 10) return; // Max level reached

        const tierLimits = [
          0, 0, 1000000, 5000000, 10000000, 20000000, 40000000, 80000000,
          160000000, 320000000, 500000000,
        ];
        const currentTierMin = tierLimits[vipInfo.rank];
        const nextTierLimit = tierLimits[vipInfo.rank + 1];
        const spentInTier = totalSpent - currentTierMin;
        const tierRange = nextTierLimit - currentTierMin;
        const progressPercent = (spentInTier / tierRange) * 100;
        const clampedProgress = Math.max(0, Math.min(100, progressPercent));
        const needMore = Math.max(0, nextTierLimit - totalSpent);

        // Update progress bar
        const progressFill = document.querySelector(".vip-progress-fill");
        const progressPercentEl = document.getElementById("progress-percent");
        const needMoreEl = document.querySelector(
          ".vip-progress-label:last-child",
        );

        if (progressFill) progressFill.style.width = clampedProgress + "%";
        if (progressPercentEl)
          progressPercentEl.textContent = clampedProgress.toFixed(1) + "%";
        if (needMoreEl)
          needMoreEl.textContent = `Need ${new Intl.NumberFormat("vi-VN").format(needMore)}đ more`;
      }

      function renderVipPage(userData, vipInfo, vipFull) {
        const vipRoot = document.getElementById("vip-page-root");
        const totalSpent = userData.totalSpent || 0;
        const balance = userData.balance || 0;

        // Calculate accurate progress percentage
        let progressPercent = 0;
        let nextTierLimit = 0;
        let needMore = 0;

        if (vipInfo.rank < 10) {
          const tierLimits = [
            0, 0, 1000000, 5000000, 10000000, 20000000, 40000000, 80000000,
            160000000, 320000000, 500000000,
          ];
          const currentTierMin = tierLimits[vipInfo.rank];
          nextTierLimit = tierLimits[vipInfo.rank + 1];
          const spentInTier = totalSpent - currentTierMin;
          const tierRange = nextTierLimit - currentTierMin;
          progressPercent = (spentInTier / tierRange) * 100;
          progressPercent = Math.max(0, Math.min(100, progressPercent));
          needMore = Math.max(0, nextTierLimit - totalSpent);
        }

        // Generate tier cards
        const allTiers = [
          { tier: 1, min: 1_000_000, discount: 1, dailyGift: 1_000 },
          { tier: 2, min: 1_000_000, discount: 2, dailyGift: 2_000 },
          { tier: 3, min: 5_000_000, discount: 3, dailyGift: 5_000 },
          { tier: 4, min: 10_000_000, discount: 4, dailyGift: 8_000 },
          { tier: 5, min: 20_000_000, discount: 5, dailyGift: 12_000 },
          { tier: 6, min: 40_000_000, discount: 6, dailyGift: 18_000 },
          { tier: 7, min: 80_000_000, discount: 7, dailyGift: 28_000 },
          { tier: 8, min: 160_000_000, discount: 8, dailyGift: 40_000 },
          { tier: 9, min: 320_000_000, discount: 9, dailyGift: 60_000 },
          { tier: 10, min: 500_000_000, discount: 10, dailyGift: 100_000 },
        ];

        const tierCardsHTML = allTiers
          .map(
            (tier) => `
          <div class="vip-tier-card ${tier.tier === vipInfo.rank ? "current" : ""}">
            <div class="vip-tier-name">VIP ${tier.tier}</div>
            <div class="vip-tier-threshold">
              Spend: ${tier.min.toLocaleString("vi-VN")}đ+
            </div>
            <div class="vip-tier-benefits">
              <div class="vip-tier-benefit">${tier.discount}% Discount</div>
              <div class="vip-tier-benefit">${tier.dailyGift.toLocaleString("vi-VN")}đ Daily Gift</div>
              ${tier.tier === vipInfo.rank ? `<div class="vip-tier-benefit" style="color: #d4af37; font-weight: bold;">✓ Current Tier</div>` : ""}
            </div>
          </div>
        `,
          )
          .join("");

        vipRoot.innerHTML = `
          <div class="vip-container">
            <!-- Header -->
            <div class="vip-header">
              <div class="vip-title">🏛️ VIP CLUB</div>
              <div class="vip-subtitle">Welcome to Exclusive Premium Benefits</div>
            </div>

            <!-- VIP Stats -->
            <div class="vip-stats">
              <div class="vip-stat-card">
                <div class="vip-stat-label">Current Rank</div>
                <div class="vip-stat-value">${vipInfo.title}</div>
                <div class="vip-rank-display">VIP Level ${vipInfo.rank}</div>
              </div>
              <div class="vip-stat-card">
                <div class="vip-stat-label">Total Spent</div>
                <div class="vip-stat-value">${totalSpent.toLocaleString("vi-VN")}</div>
                <div class="vip-rank-display">đ</div>
              </div>
              <div class="vip-stat-card">
                <div class="vip-stat-label">Current Balance</div>
                <div class="vip-stat-value">${balance.toLocaleString("vi-VN")}</div>
                <div class="vip-rank-display">đ</div>
              </div>
              <div class="vip-stat-card">
                <div class="vip-stat-label">Daily Reward</div>
                <div class="vip-stat-value">${vipInfo.dailyGift.toLocaleString("vi-VN")}</div>
                <div class="vip-rank-display">đ</div>
              </div>
            </div>

            <!-- Progress Bar to Next Tier -->
            ${
              vipInfo.rank < 10
                ? `
              <div class="vip-progress-section">
                <div class="vip-progress-label">
                  <span>👑 VIP ${vipInfo.rank} → VIP ${vipInfo.rank + 1}</span>
                  <span id="progress-percent">${progressPercent.toFixed(1)}%</span>
                </div>
                <div class="vip-progress-container">
                  <div class="vip-progress-fill" style="width: ${progressPercent}%;"></div>
                </div>
                <div class="vip-progress-label" style="margin-top: 0.5rem; font-size: 0.8rem; justify-content: flex-end;">
                  Need ${new Intl.NumberFormat("vi-VN").format(needMore)}đ more
                </div>
              </div>
            `
                : `
              <div class="vip-progress-section" style="text-align: center; background: rgba(52, 211, 153, 0.1); border-color: rgba(52, 211, 153, 0.3);">
                <div style="font-size: 1.5rem; color: #34d399; font-weight: bold;">🎉 Maximum VIP Level Reached!</div>
                <div style="color: #888; margin-top: 0.5rem;">You're at the highest VIP tier with all premium benefits unlocked</div>
              </div>
            `
            }

            <!-- Daily Gift Section -->
            <div class="vip-gift-section">
              <div class="vip-gift-title">🎁 Daily VIP Reward</div>
              <div class="vip-gift-amount">${vipInfo.dailyGift.toLocaleString("vi-VN")}đ</div>
              <button id="claim-gift-btn" class="vip-gift-button" ${vipFull.canClaimGift ? "" : "disabled"}>
                ${vipFull.canClaimGift ? "Claim Now" : "Already Claimed"}
              </button>
              <div class="vip-gift-cooldown">
                ${vipFull.canClaimGift ? "Claim once every 24 hours" : `Next claim in: <span id="gift-countdown">--:--:--</span>`}
              </div>
            </div>

            <!-- All VIP Tiers -->
            <div class="vip-tiers-section">
              <div class="vip-tiers-title">VIP Tier Benefits</div>
              <div class="vip-tiers-grid">
                ${tierCardsHTML}
              </div>
            </div>

            <!-- VIP Exclusive Store -->
            <div class="vip-products-section" style="display: flex; flex-direction: column; gap: 1rem;">
              <div style="display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;">
                <div class="vip-products-title">✨ VIP Exclusive Store</div>
                <a href="vip-products.html" class="vip-gift-button" style="background: #d4af37; color: #000; padding: 0.85rem 1.25rem; border-radius: 999px; text-decoration: none; font-weight: 700;">Go to VIP Store</a>
              </div>
              <div id="vip-products-grid" class="vip-products-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.5rem; margin-top: 2rem;">
                <div style="grid-column: 1/-1; text-align: center; color: #888; padding: 3rem 1rem;">Loading VIP products...</div>
              </div>
            </div>
          </div>
        `;

        // Add claim gift handler
        const claimBtn = vipRoot.querySelector("#claim-gift-btn");
        if (claimBtn && vipFull.canClaimGift) {
          claimBtn.addEventListener("click", async () => {
            try {
              claimBtn.disabled = true;
              claimBtn.textContent = "Claiming...";

              const result = await claimDailyVIPGift(auth.currentUser.uid);

              if (result.success) {
                toastSuccess(result.message);

                // Reload page to update UI
                setTimeout(() => {
                  window.location.reload();
                }, 1000);
              } else {
                toastInfo(result.message);
                claimBtn.disabled = false;
                claimBtn.textContent = "Claim Now";
              }
            } catch (error) {
              console.error("Claim gift error:", error);
              toastError("Failed to claim gift");
              claimBtn.disabled = false;
              claimBtn.textContent = "Claim Now";
            }
          });
        }

        // Real-time countdown timer
        if (!vipFull.canClaimGift && vipFull.lastClaimedGift) {
          const countdownElement = vipRoot.querySelector("#gift-countdown");
          if (countdownElement) {
            const updateCountdown = () => {
              const nextClaimTime = new Date(
                vipFull.lastClaimedGift.getTime() + 24 * 60 * 60 * 1000,
              );
              const now = new Date();
              const timeLeft = Math.max(0, nextClaimTime - now);

              if (timeLeft <= 0) {
                countdownElement.textContent = "00:00:00";
                window.location.reload(); // Auto-refresh when timer expires
                return;
              }

              const hours = Math.floor(timeLeft / (1000 * 60 * 60));
              const minutes = Math.floor(
                (timeLeft % (1000 * 60 * 60)) / (1000 * 60),
              );
              const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

              countdownElement.textContent = `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
            };

            updateCountdown(); // Initial update
            const timerInterval = setInterval(updateCountdown, 1000);

            // Cleanup on page unload
            window.addEventListener("beforeunload", () =>
              clearInterval(timerInterval),
            );
          }
        }

        // Load VIP products
        loadVIPProducts(vipInfo.rank);
      }

      async function loadVIPProducts(userVipLevel) {
        const { collection, query, where, getDocs } =
          await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js");

        try {
          const productsGrid = document.getElementById("vip-products-grid");
          if (!productsGrid) return;

          // Fetch all VIP-only products
          const q = query(
            collection(db, "products"),
            where("isVIPOnly", "==", true),
          );
          const snapshot = await getDocs(q);

          const products = snapshot.docs
            .map((doc) => ({ id: doc.id, ...doc.data() }))
            .filter((p) => p.requiredVIP <= userVipLevel)
            .slice(0, 30);

          if (products.length === 0) {
            productsGrid.innerHTML =
              '<div style="grid-column: 1/-1; text-align: center; color: #888; padding: 3rem 1rem;">Upgrade to higher VIP level to unlock exclusive products!</div>';
            return;
          }

          const productsHTML = products
            .map((product) => {
              const isLocked = product.requiredVIP > userVipLevel;
              return `
            <div class="vip-product-card ${isLocked ? "is-locked" : ""}">
              <div class="vip-product-image">
                ${product.image ? `<img src="${product.image}" alt="${product.name}" style="width: 100%; height: 100%; object-fit: cover;">` : "☕"}
              </div>
              ${isLocked ? `<div class="lock-overlay"><div>🔒</div><div>VIP ${product.requiredVIP}+</div></div>` : ""}
              <div class="vip-product-info">
                <div class="vip-product-name">${product.name}</div>
                <div style="color: #888; font-size: 12px; margin: 0.5rem 0; height: 32px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;">
                  ${product.description || ""}
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 0.75rem;">
                  <div class="vip-product-price">${Number(product.price || 0).toLocaleString("vi-VN")}đ</div>
                  ${product.discount > 0 ? `<span style="background: #ff4757; color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold;">-${product.discount}%</span>` : ""}
                </div>
              </div>
            </div>
          `;
            })
            .join("");

          productsGrid.innerHTML = productsHTML;
        } catch (error) {
          console.error("Error loading VIP products:", error);
          const productsGrid = document.getElementById("vip-products-grid");
          if (productsGrid) {
            productsGrid.innerHTML =
              '<div style="grid-column: 1/-1; text-align: center; color: #f44336; padding: 2rem;">Error loading VIP products</div>';
          }
        }
      }
    </script>
  </body>
</html>
