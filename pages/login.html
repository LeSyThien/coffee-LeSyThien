<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to The Gilded Bean | Premium Coffee Experience</title>
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/theme.css" />
    <style>
      /* ===== CINEMATIC AUTHENTICATION EXPERIENCE ===== */

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: var(--font-sans);
        background: var(--color-surface-l0);
        overflow-x: hidden;
        min-height: 100vh;
      }

      /* ===== SPLIT SCREEN LAYOUT ===== */
      .auth-container {
        display: flex;
        min-height: 100vh;
        position: relative;
      }

      /* ===== LEFT SIDE - CINEMATIC VISUAL ===== */
      .auth-visual {
        flex: 0 0 60%;
        position: relative;
        background: linear-gradient(
          135deg,
          #1a1a1c 0%,
          #0a0a0b 50%,
          #1a1a1c 100%
        );
        overflow: hidden;
        opacity: 0;
        animation: visualFadeIn 1.2s ease-out 0.2s forwards;
      }

      .auth-visual::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="coffee-beans" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="5" cy="5" r="2" fill="rgba(212,175,55,0.1)"/><circle cx="15" cy="15" r="1.5" fill="rgba(198,124,78,0.08)"/><circle cx="8" cy="12" r="1" fill="rgba(139,111,71,0.06)"/></pattern></defs><rect width="100" height="100" fill="url(%23coffee-beans)"/></svg>');
        opacity: 0.4;
        pointer-events: none;
      }

      .auth-visual::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(
          ellipse at center,
          transparent 30%,
          rgba(10, 10, 11, 0.8) 100%
        );
        pointer-events: none;
      }

      .visual-content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 2;
        color: var(--color-text-primary);
        max-width: 500px;
        padding: 0 var(--space-lg);
      }

      .visual-title {
        font-family: var(--font-serif);
        font-size: clamp(2.5rem, 5vw, 4rem);
        font-weight: 700;
        margin-bottom: var(--space-md);
        text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
        line-height: 1.1;
      }

      .visual-subtitle {
        font-size: clamp(1.1rem, 2vw, 1.4rem);
        color: var(--color-text-secondary);
        opacity: 0.9;
        line-height: 1.6;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
      }

      /* ===== RIGHT SIDE - FORM ===== */
      .auth-form {
        flex: 0 0 40%;
        background: var(--color-surface-l0);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--space-2xl);
        position: relative;
      }

      .form-container {
        width: 100%;
        max-width: 400px;
        opacity: 0;
        transform: translateY(30px);
        animation: formSlideIn 0.8s ease-out 0.6s forwards;
      }

      /* ===== ANIMATIONS ===== */
      @keyframes visualFadeIn {
        to {
          opacity: 1;
        }
      }

      @keyframes formSlideIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ===== FORM ELEMENTS ===== */
      .form-header {
        text-align: center;
        margin-bottom: var(--space-3xl);
        opacity: 0;
        transform: translateY(20px);
        animation: elementFadeIn 0.6s ease-out 0.8s forwards;
      }

      .form-title {
        font-family: var(--font-serif);
        font-size: 2.5rem;
        font-weight: 700;
        color: var(--color-text-primary);
        margin-bottom: var(--space-sm);
        line-height: 1.2;
      }

      .form-subtitle {
        color: var(--color-text-secondary);
        font-size: 1rem;
        opacity: 0.8;
      }

      /* ===== GOOGLE LOGIN ===== */
      .google-button {
        width: 100%;
        height: 56px;
        background: var(--color-surface-l1);
        border: 2px solid var(--color-border-subtle);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all var(--transition-fast) var(--easing-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-sm);
        margin-bottom: var(--space-lg);
        opacity: 0;
        transform: translateY(20px);
        animation: elementFadeIn 0.6s ease-out 1s forwards;
        position: relative;
        overflow: hidden;
      }

      .google-button::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.05) 0%,
          transparent 50%
        );
        opacity: 0;
        transition: opacity var(--transition-fast) var(--easing-primary);
      }

      .google-button:hover {
        border-color: var(--color-metallic-gold);
        background: var(--color-surface-l2);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
      }

      .google-button:hover::before {
        opacity: 1;
      }

      .google-button:active {
        transform: translateY(0);
        transition: transform 100ms var(--easing-primary);
      }

      .google-button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .google-button.loading {
        color: transparent;
      }

      .google-button.loading::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 24px;
        height: 24px;
        margin: -12px 0 0 -12px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top: 2px solid var(--color-text-primary);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .google-icon {
        width: 20px;
        height: 20px;
        flex-shrink: 0;
      }

      /* ===== SWITCH LINK ===== */
      .auth-switch {
        text-align: center;
        opacity: 0;
        transform: translateY(20px);
        animation: elementFadeIn 0.6s ease-out 1.1s forwards;
      }

      .auth-switch-text {
        color: var(--color-text-secondary);
        font-size: 0.9rem;
      }

      .auth-switch-link {
        color: var(--color-primary-accent);
        text-decoration: none;
        font-weight: 600;
        transition: all var(--transition-fast) var(--easing-primary);
        position: relative;
      }

      .auth-switch-link::after {
        content: "";
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 0;
        height: 2px;
        background: var(--color-primary-accent);
        transition: width var(--transition-fast) var(--easing-primary);
      }

      .auth-switch-link:hover::after {
        width: 100%;
      }

      /* ===== ERROR MESSAGE ===== */
      .error-message {
        background: rgba(255, 77, 79, 0.1);
        border: 1px solid var(--color-error);
        border-radius: var(--radius-sm);
        padding: var(--space-md);
        margin-bottom: var(--space-lg);
        color: var(--color-error);
        font-size: 0.9rem;
        opacity: 0;
        transform: translateY(-10px);
        animation: errorSlideIn 0.4s ease-out forwards;
        display: none;
      }

      @keyframes errorSlideIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ===== ELEMENT FADE IN ===== */
      @keyframes elementFadeIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ===== RESPONSIVE ===== */
      @media (max-width: 1024px) {
        .auth-container {
          flex-direction: column;
        }

        .auth-visual {
          flex: 0 0 50vh;
          min-height: 300px;
        }

        .auth-form {
          flex: 1;
          padding: var(--space-xl);
        }

        .form-title {
          font-size: 2rem;
        }

        .visual-title {
          font-size: clamp(2rem, 8vw, 3rem);
        }
      }

      @media (max-width: 768px) {
        .auth-visual {
          flex: 0 0 40vh;
        }

        .form-container {
          max-width: 100%;
        }

        .auth-form {
          padding: var(--space-lg);
        }
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <!-- LEFT SIDE - CINEMATIC VISUAL -->
      <div class="auth-visual">
        <div class="visual-content">
          <h1 class="visual-title">Welcome to The Gilded Bean</h1>
          <p class="visual-subtitle">
            Experience the art of exceptional coffee, crafted for the discerning
            palate
          </p>
        </div>
      </div>

      <!-- RIGHT SIDE - FORM -->
      <div class="auth-form">
        <div class="form-container">
          <div class="form-header">
            <h2 class="form-title">Welcome Back</h2>
            <p class="form-subtitle">Sign in to your account</p>
          </div>

          <div id="error-message" class="error-message"></div>

          <button id="google-login" class="google-button">
            <svg class="google-icon" viewBox="0 0 24 24">
              <path
                fill="currentColor"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              />
              <path
                fill="currentColor"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              />
              <path
                fill="currentColor"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
              />
              <path
                fill="currentColor"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              />
            </svg>
            Continue with Google
          </button>

          <div class="auth-switch">
            <span class="auth-switch-text">Don't have an account? </span>
            <a href="register.html" class="auth-switch-link">Create one</a>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import {
        loginWithGoogle,
        auth,
      } from "../js/services/firebase.service.js";
      import { initializeAuth } from "../js/core/auth-init.js";
      import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

      initializeAuth()
        .then(() => {
          console.log("Auth initialized successfully!");
        })
        .catch((error) => {
          console.error("Auth initialization failed:", error);
        });
      onAuthStateChanged(auth, (user) => {
        if (user) {
          window.location.href = "index.html";
        }
      });

      const googleLoginBtn = document.getElementById("google-login");
      const errorMessageDiv = document.getElementById("error-message");

      // Auto-focus first interactive element
      googleLoginBtn.focus();

      googleLoginBtn.onclick = async () => {
        try {
          // Show loading state
          googleLoginBtn.disabled = true;
          googleLoginBtn.classList.add("loading");
          errorMessageDiv.style.display = "none";

          // Attempt login
          await loginWithGoogle();

          // Success - redirect to home
          setTimeout(() => {
            window.location.href = "index.html";
          }, 500);
        } catch (error) {
          // Show error message
          console.error("Login error:", error);
          googleLoginBtn.disabled = false;
          googleLoginBtn.classList.remove("loading");
          errorMessageDiv.style.display = "block";

          // User-friendly error message
          let errorMsg = "Login failed. Please try again.";
          if (error.code === "auth/popup-closed-by-user") {
            errorMsg = "Login cancelled.";
          } else if (error.code === "auth/popup-blocked") {
            errorMsg =
              "Login popup was blocked. Please allow popups and try again.";
          } else if (error.message) {
            errorMsg = error.message;
          }

          errorMessageDiv.textContent = "❌ " + errorMsg;
        }
      };
    </script>
  </body>
</html>
